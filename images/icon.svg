<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#06101A"/>
      <stop offset="40%" stop-color="#081418"/>
      <stop offset="100%" stop-color="#040C12"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="46%" r="42%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="div" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0"/>
      <stop offset="50%" stop-color="#22D3EE" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background matching splash gradient -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#glow)"/>
  <!-- HVAC — bold, wide, white (splash .sp-t-main style) -->
  <text x="261" y="262" text-anchor="middle"
        font-family="-apple-system, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="140" font-weight="700" letter-spacing="10"
        fill="#FFFFFF">HVAC</text>
  <!-- Accent divider (splash .sp-t-div style) -->
  <rect x="100" y="282" width="312" height="1.2" rx="0.6" fill="url(#div)"/>
  <!-- PULSE — cyan, wide-spaced (splash .sp-t-sub style) -->
  <text x="266" y="345" text-anchor="middle"
        font-family="-apple-system, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="76" font-weight="400" letter-spacing="20"
        fill="#22D3EE">PULSE</text>
</svg>